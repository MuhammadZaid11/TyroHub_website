<!DOCTYPE html>

<body class="selection:bg-brand-blue-500 selection:text-white transition-colors duration-300">

  <!-- Background Aesthetics -->
  <div class="fixed inset-0 pointer-events-none z-[-1] overflow-hidden bg-brand-navy-950 dark:bg-brand-navy-950 transition-colors duration-300" id="global-bg">
    <!-- Glowing blue gradients -->
    <div class="absolute top-[-10%] right-[-10%] w-[300px] sm:w-[500px] h-[300px] sm:h-[500px] rounded-full bg-brand-blue-500/10 blur-[80px] sm:blur-[120px] dark:bg-brand-blue-500/5"></div>
    <div class="absolute bottom-[-10%] left-[-10%] w-[400px] sm:w-[600px] h-[400px] sm:h-[600px] rounded-full bg-indigo-500/10 blur-[90px] sm:blur-[130px] dark:bg-indigo-500/5"></div>

    <div class="absolute inset-0 bg-[linear-gradient(to_right,rgba(148,163,184,0.02)_1px,transparent_1px),linear-gradient(to_bottom,rgba(148,163,184,0.02)_1px,transparent_1px)] bg-[size:32px_32px] dark:bg-[linear-gradient(to_right,rgba(255,255,255,0.01)_1px,transparent_1px),linear-gradient(to_bottom,rgba(255,255,255,0.01)_1px,transparent_1px)]"></div>

  <!-- Mobile Hamburger Menu Navigation Drawer -->
  <div id="mobile-menu-container" class="fixed inset-0 z-40 lg:hidden pointer-events-none transition-all duration-300"></div>

  <!-- Dynamic Content Area -->
  <main id="app-content" class="min-h-screen pt-20 transition-colors duration-300"></main>

  <!-- Footer Shell -->
  <footer id="footer-container" class="border-t border-slate-200/5 dark:border-white/5 bg-brand-navy-950/40 transition-colors duration-300"></footer>

  <!-- Quick View Product Modal -->
  <div id="quickview-modal-container" class="fixed inset-0 z-50 flex items-center justify-center pointer-events-none opacity-0 transition-opacity duration-300"></div>

  <!-- Auth Modal (Sign In / Sign Up Card) -->
  <div id="auth-modal-container" class="fixed inset-0 z-50 flex items-center justify-center pointer-events-none opacity-0 transition-all duration-300"></div>

  <!-- Floating Toast Notifications -->
  <div id="toast-container" class="fixed bottom-6 right-6 z-50 flex flex-col gap-3 max-w-sm w-full px-4 pointer-events-none"></div>

  <!-- Entry Logic Modules -->
  <script type="module" src="/js/app.js"></script>
